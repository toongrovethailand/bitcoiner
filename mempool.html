<div class="bg-black/80 border-b border-slate-800 pt-4 pb-6 overflow-visible flex flex-col shadow-inner relative z-20">
    <div class="flex justify-between w-full px-6 mb-4">
        <h3 class="text-sm text-slate-400 font-bold uppercase tracking-wider flex items-center gap-2 cursor-pointer hover:text-cyan-400 transition-colors w-max group" onclick="App.toggleModal('modal-mempool', true)">
            <span class="w-2 h-2 rounded-full bg-emerald-500 live-badge" id="sync-dot"></span> 
            <span class="underline decoration-dashed decoration-slate-500/50 group-hover:decoration-current underline-offset-4">Mempool & Blockchain State</span>
        </h3>
    </div>
    
    <div class="flex items-center w-full pb-2 relative overflow-visible">
        <div class="flex-1 w-0 flex justify-end gap-2 sm:gap-3 pr-4 sm:pr-8">
            <div class="block-cube" style="background: linear-gradient(180deg, #4c1d95 0%, #1e1b4b 100%); border: 1px solid #7c3aed;" onclick="App.autoFillFromMempool()">
                <span class="text-fuchsia-400 font-bold text-sm">Auto Fill</span>
                <span class="text-white font-bold text-base mt-1">Top Fee</span>
                <span class="text-[10px] text-slate-300 mt-2 truncate w-full">ดึงจาก Mempool จริง</span>
            </div>

            <div class="block-cube mempool-high" onclick="App.loadMempoolTemplate('high')">
                <span class="text-amber-400 font-bold text-sm">~45 sat/vB</span>
                <span class="text-white font-bold text-base mt-1">~180,000 sats</span>
                <span class="text-xs text-slate-300 mt-2 truncate w-full">คลิกเพื่อดึงข้อมูล</span>
            </div>
            <div class="block-cube mempool-med" onclick="App.loadMempoolTemplate('med')">
                <span class="text-emerald-300 font-bold text-sm">~15 sat/vB</span>
                <span class="text-white font-bold text-base mt-1">~60,000 sats</span>
                <span class="text-xs text-slate-300 mt-2 truncate w-full">คลิกเพื่อดึงข้อมูล</span>
            </div>
            <div class="block-cube mempool-low" onclick="App.loadMempoolTemplate('low')">
                <span class="text-emerald-400 font-bold text-sm">~9 sat/vB</span>
                <span class="text-white font-bold text-base mt-1">~36,000 sats</span>
                <span class="text-xs text-slate-300 mt-2 truncate w-full">คลิกเพื่อดึงข้อมูล</span>
            </div>
        </div>

        <div class="flex-shrink-0 border-l-2 border-dashed border-slate-500 h-28 relative z-[100] mx-1 sm:mx-2">
            <span class="absolute -top-7 left-1/2 transform -translate-x-1/2 text-[10px] text-white bg-slate-900 px-3 py-1 border border-slate-600 font-bold rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.8)] z-[110] whitespace-nowrap">NOW</span>
        </div>

        <div class="flex-1 w-0 flex justify-start gap-2 sm:gap-3 pl-4 sm:pl-8" id="blockchain-strip-right">
            <div class="block-cube chain-latest" id="latest-chain-block" onclick="App.toggleModal('latest-modal', true)">
                <span class="text-cyan-400 font-bold text-lg sm:text-xl" id="strip-latest-height">#Syncing</span>
                <span class="text-slate-200 text-xs mt-1">Latest Block</span>
                <span class="text-[10px] sm:text-xs text-cyan-200/50 mt-2 hover:underline">Click to view</span>
            </div>
            <div class="block-cube chain-inter cursor-default">
                <span class="text-slate-400 font-bold text-lg sm:text-xl" id="strip-inter-height">...</span>
                <span class="text-slate-500 text-xs mt-1">Pruned Blocks</span>
            </div>
            <div class="block-cube chain-genesis" onclick="App.toggleModal('genesis-modal', true)">
                <span class="text-amber-400 font-bold text-lg sm:text-xl">#0</span>
                <span class="text-slate-200 text-xs mt-1">Genesis</span>
                <span class="text-[10px] sm:text-xs text-amber-200/50 mt-2 hover:underline">Click to view</span>
            </div>
        </div>
    </div>
</div>
